<!DOCTYPE html>
<html>
<head>
  <title>System Simulation</title>
  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: monospace;
      text-align: center;
      color: lime;
    }

    .center {
      position: absolute;
      top: 40%;
      width: 100%;
    }

    #loading {
      font-size: 20px;
    }

    #granted {
      display: none;
      font-size: 32px;
      color: lime;
    }

    #warning {
      display: none;
      font-size: 26px;
      color: red;
    }

    #viewer {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
    }

    #viewer img {
      max-width: 140%;
      max-height: 140%;
      transform: scale(1.15); /* 🔥 zoom effect */
    }

    #final {
      display: none;
      color: white;
      padding: 40px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div id="loading" class="center">
  <div>Loading system modules...</div>
  <div>Decrypting data...</div>
  <div>Preparing interface...</div>
  <br>
  <div id="percent">0%</div>
</div>

<div id="granted" class="center">
  >>> ACCESS GRANTED (SIMULATION)
</div>

<div id="warning" class="center">
  ⚠ WARNING: SYSTEM BEHAVIOR ACTIVE ⚠
</div>

<div id="viewer">
  <img id="img" src="">
</div>

<div id="final">
  <h2>END OF SIMULATION</h2>
  <p>
    Nothing was accessed or hacked.<br><br>
    Just a visual experience 😄
  </p>
</div>

<script>
  let percent = 0;

  const images = [
    "IMAGE_LINK_1",
    "IMAGE_LINK_2",
    "IMAGE_LINK_3",
    "IMAGE_LINK_4"
  ];

  let index = 0;

  let load = setInterval(() => {
    percent += 5;
    document.getElementById("percent").innerText = percent + "%";

    if (percent >= 100) {
      clearInterval(load);

      document.getElementById("loading").style.display = "none";

      // ACCESS GRANTED
      document.getElementById("granted").style.display = "block";

      setTimeout(() => {
        document.getElementById("granted").style.display = "none";

        // WARNING
        document.getElementById("warning").style.display = "block";

        setTimeout(() => {
          document.getElementById("warning").style.display = "none";

          // IMAGE VIEWER
          document.getElementById("viewer").style.display = "flex";

          setInterval(() => {
            document.getElementById("img").src = images[index];
            index = (index + 1) % images.length;
          }, 500);

          // END
          setTimeout(() => {
            document.getElementById("viewer").style.display = "none";
            document.getElementById("final").style.display = "block";
          }, 7000);

        }, 2000);

      }, 2000);
    }
  }, 150);
</script>

</body>
</html>
