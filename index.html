<!DOCTYPE html>
<html>
<head>
  <title>Simulation Console</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: lime;
      font-family: monospace;
      overflow: hidden;
    }

    #terminal {
      padding: 20px;
      height: 100vh;
      box-sizing: border-box;
    }

    #output {
      height: 70vh;
      overflow-y: auto;
      white-space: pre-line;
    }

    #inputBox {
      position: absolute;
      bottom: 20px;
      width: 90%;
    }

    input {
      width: 100%;
      background: black;
      color: lime;
      border: 1px solid lime;
      padding: 10px;
      font-family: monospace;
    }

    #warning {
      color: red;
      display: none;
      font-size: 20px;
    }

    #granted {
      color: lime;
      display: none;
      font-size: 22px;
    }

    #imageView {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
    }

    #imageView img {
      max-width: 130%;
      max-height: 130%;
      transform: scale(1.2); /* 🔥 zoom effect */
    }

    #final {
      display: none;
      color: white;
      padding: 30px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div id="terminal">
  <div id="output"></div>

  <div id="warning">⚠ SIMULATION MODE DETECTED ⚠</div>
  <div id="granted">>>> ACCESS GRANTED (SIMULATION)</div>

  <div id="inputBox">
    <input id="cmd" placeholder="type command...">
  </div>
</div>

<div id="imageView">

</div>

<div id="final">

  let imgIndex = 0;

  function typeLine(text) {
    output.innerHTML += "> " + text + "\n";
  }

  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      let cmd = input.value;
      input.value = "";

      typeLine(cmd);

      runCommand(cmd);
    }
  });

  function runCommand(cmd) {

    if (cmd.toLowerCase().includes("access")) {
      document.getElementById("warning").style.display = "block";

      setTimeout(() => {
        document.getElementById("warning").style.display = "none";
        document.getElementById("granted").style.display = "block";

        setTimeout(() => {
          document.getElementById("granted").style.display = "none";

          startImages();

        }, 2000);
      }, 2000);
    }

    else {
      typeLine("command not recognized in simulation mode");
    }
  }

  function startImages() {
    document.getElementById("terminal").style.display = "none";
    document.getElementById("imageView").style.display = "flex";

    setInterval(() => {
      document.getElementById("img").src = images[imgIndex];
      imgIndex = (imgIndex + 1) % images.length;
    }, 500);

    setTimeout(() => {
      document.getElementById("imageView").style.display = "none";
      document.getElementById("final").style.display = "block";
    }, 7000);
  }
</script>
